name: Build and Test Plugin

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.x']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8

        # Для CI архитектурных/сервисных тестов не ставим тяжелые GIS/UI зависимости,
        # требующие системные dev-пакеты (например, gdal-config).
        if [ -f requirements.txt ]; then
          grep -Ev '^(GDAL|PyQt5)\b' requirements.txt > /tmp/requirements-ci.txt
          if [ -s /tmp/requirements-ci.txt ]; then
            pip install -r /tmp/requirements-ci.txt
          fi
        fi

        if [ -f install_packages/requirements.txt ]; then
          grep -Ev '^(GDAL|PyQt5)\b' install_packages/requirements.txt > /tmp/install-requirements-ci.txt
          if [ -s /tmp/install-requirements-ci.txt ]; then
            pip install -r /tmp/install-requirements-ci.txt
          fi
        fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test architecture and core services
      run: |
        pytest tests/test_architecture_imports.py tests/test_services.py -v
