name: Build and Test Plugin

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: '3.9'
            run-services-tests: true
          - python-version: '3.x'
            run-services-tests: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8

        # Минимальные зависимости для service-тестов на Python 3.9.
        if [ "${{ matrix.run-services-tests }}" = "true" ]; then
          pip install inject ezdxf
        fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test architecture and core services
      run: |
        if [ "${{ matrix.run-services-tests }}" = "true" ]; then
          pytest tests/test_architecture_imports.py tests/test_services.py -v
        else
          pytest tests/test_architecture_imports.py -v
        fi
